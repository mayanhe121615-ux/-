    <style>
        /* 基礎樣式設定 */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #ffffff;
            font-family: "Noto Serif TC", "Songti TC", "SimSun", "Times New Roman", serif;
            color: #1a1a1a;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* 電子書整體容器（左翻頁 3D 視角環境） */
        .book-container {
            width: 900px;
            height: 600px;
            position: relative;
            perspective: 2000px;
            background-color: #ffffff;
        }

        /* 單頁通用樣式 */
        .page {
            width: 450px;
            height: 600px;
            position: absolute;
            top: 0;
            right: 0;
            transform-origin: left center;
            transform-style: preserve-3d;
            transition: transform 0.8s cubic-bezier(0.25, 1, 0.5, 1);
            background-color: #ffffff;
            box-shadow: inset 1px 0 0 rgba(0,0,0,0.05);
            z-index: 1;
        }

        /* 書頁的正反面容器 */
        .page-front, .page-back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            background-color: #ffffff;
            padding: 60px 50px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        /* 反面需要水平翻轉 */
        .page-back {
            transform: rotateY(180deg);
            border-right: 1px solid rgba(0, 0, 0, 0.05);
        }

        /* 頁面翻開後的狀態（向左翻轉 180 度） */
        .page.flipped {
            transform: rotateY(-180deg);
        }

        /* 封面專屬樣式 */
        .cover-page {
            background-color: #ffffff;
            border-left: 4px solid #002FA7; /* 克萊茵藍左邊條飾 */
            padding: 0;
        }
        
        .cover-image-container {
            width: 100%;
            height: 100%;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .cover-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* 克萊茵藍標題遮罩層（若需要直接在封面上呈現文字） */
        .cover-title-overlay {
            position: absolute;
            bottom: 40px;
            left: 40px;
            right: 40px;
            background: rgba(255, 255, 255, 0.95);
            padding: 25px;
            border-left: 5px solid #002FA7;
        }
